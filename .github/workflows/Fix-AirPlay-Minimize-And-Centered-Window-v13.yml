name: Fix minimize ghost and center startup window v13

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-window-lifecycle:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply window lifecycle patch
        shell: pwsh
        run: |
          $patchBase64 = @(
            ''
            ''
            ''
          ) -join ""

          $patchPath = Join-Path `
            $env:RUNNER_TEMP `
            "fix-window-lifecycle-v13.py"

          [IO.File]::WriteAllBytes(
              $patchPath,
              [Convert]::FromBase64String($patchBase64))

          python $patchPath

      - name: Verify source patch
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $source = "AirPlayServer\CSDLPlayer.cpp"

          Select-String -Path $source -Pattern "AIRPLAY_WINDOW_LIFECYCLE_FIX_V13"
          Select-String -Path $source -Pattern "AirPlayApplyInitialWindowLayout"
          Select-String -Path $source -Pattern "usableBounds.w \* 3 / 5"
          Select-String -Path $source -Pattern "usableBounds.h \* 2 / 3"
          Select-String -Path $source -Pattern "AirPlayMainWindowDrawable"
          Select-String -Path $source -Pattern "SDL_WINDOWEVENT_MINIMIZED"
          Select-String -Path $source -Pattern "AirPlayHideAuxiliaryWindows"

          $changedFiles = @(git diff --name-only)
          $unexpected = @(
            $changedFiles |
              Where-Object {
                $_ -ne "AirPlayServer/CSDLPlayer.cpp"
              }
          )

          if ($unexpected.Count -gt 0) {
            throw (
              "Unexpected files changed: " +
              ($unexpected -join ", ")
            )
          }

          git diff --check

      - name: Build Release x64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          msbuild AirPlay.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /verbosity:minimal

      - name: Prepare test package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = Get-ChildItem `
            -Path $env:GITHUB_WORKSPACE `
            -Recurse `
            -Filter AirPlayServer.exe |
            Where-Object {
              $_.FullName -match '[\\/]x64[\\/]Release[\\/]'
            } |
            Select-Object -First 1

          if ($null -eq $exe) {
            throw "Release x64 AirPlayServer.exe was not found."
          }

          $package = Join-Path `
            $env:RUNNER_TEMP `
            "AirPlayServer-Window-Fix-v13"

          New-Item `
            -ItemType Directory `
            -Path $package `
            -Force |
            Out-Null

          Copy-Item `
            -Path (Join-Path $exe.Directory.FullName "*") `
            -Destination $package `
            -Recurse `
            -Force

          "ARTIFACT_PATH=$package" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: Upload test package
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayServer-Window-Fix-v13
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Commit fix
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ((git status --porcelain).Length -eq 0) {
            Write-Host "No source changes need to be committed."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email `
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- AirPlayServer/CSDLPlayer.cpp

          $staged = @(git diff --cached --name-only)

          if (
            $staged.Count -ne 1 -or
            $staged[0] -ne "AirPlayServer/CSDLPlayer.cpp"
          ) {
            throw (
              "Unexpected staged files: " +
              ($staged -join ", ")
            )
          }

          git commit -m `
            "Fix minimize ghost and center startup window"

          git push
