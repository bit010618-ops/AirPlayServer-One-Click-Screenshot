            (Join-Path $root 'payload\CScreenSnipper.cpp'),
            [Convert]::FromBase64String(($sourceBase64 -replace '\s', '')))

          & (Join-Path $root 'install-region-capture.ps1') -RepositoryRoot $env:GITHUB_WORKSPACE

      - name: Verify source changes
        shell: pwsh
        run: |
          if (-not (Test-Path 'AirPlayServer/CScreenSnipper.cpp')) {
            throw 'CScreenSnipper.cpp was not created.'
          }
          if (-not (Select-String -Path 'AirPlayServer/CScreenSnipper.cpp' -Pattern 'CopySelectionToClipboard' -Quiet)) {
            throw 'Clipboard implementation was not found.'
          }
          if (-not (Select-String -Path 'AirPlayServer/CImGuiManager.cpp' -Pattern 'Region Capture' -Quiet)) {
            throw 'Region Capture button was not found.'
          }
          if (-not (Select-String -Path 'AirPlayServer/CSDLPlayer.cpp' -Pattern 'ConsumeRegionCaptureRequest' -Quiet)) {
            throw 'CSDLPlayer integration was not found.'
          }
          git diff --check

      - name: Build Release x64
        shell: pwsh
        run: |
          msbuild AirPlay.sln /m /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Upload compiled test build
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayServer-Cpp-Region-Capture
          path: |
            x64/Release/AirPlayServer.exe
            x64/Release/*.dll
          if-no-files-found: error

      - name: Commit C++ region capture
        shell: pwsh
        run: |
          if (-not (git status --porcelain)) {
            Write-Host 'No source changes to commit.'
            exit 0
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add `
            AirPlayServer/CScreenSnipper.cpp `
            AirPlayServer/CScreenSnipper.h `
            AirPlayServer/CSDLPlayer.cpp `
            AirPlayServer/CSDLPlayer.h `
            AirPlayServer/CImGuiManager.cpp `
            AirPlayServer/CImGuiManager.h `
            AirPlayServer/AirPlayServer.vcxproj `
            AirPlayServer/AirPlayServer.vcxproj.filters `
            README.md

          git commit -m 'Add C++ free region capture to clipboard'
          git push
