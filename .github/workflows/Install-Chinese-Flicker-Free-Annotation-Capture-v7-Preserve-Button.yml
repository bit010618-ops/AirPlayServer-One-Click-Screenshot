name: 安装中文无闪烁标注截图 v7 保留原按钮

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: windows-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 安装中文界面和标注截图
        shell: pwsh
        run: |
          $patchBase64 = @(
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
          ) -join ""

          $patchPath = Join-Path $env:RUNNER_TEMP "apply-v6-preserve.ps1"
          [IO.File]::WriteAllBytes(
              $patchPath,
              [Convert]::FromBase64String($patchBase64))
          & $patchPath

      - name: 检查源码修改
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Select-String `
            -Path AirPlayServer\CSDLPlayer.cpp `
            -Pattern "区域截图"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern 'L"矩形"'
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern 'L"圆形"'
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern 'L"三角"'
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern 'L"箭头"'
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern 'L"马赛克"'
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "m_dimDC"
          Select-String `
            -Path AirPlayServer\CImGuiManager.cpp `
            -Pattern "GetGlyphRangesChineseFull"

          if (Select-String `
              -Path AirPlayServer\CScreenSnipper.cpp `
              -Pattern "SetLayeredWindowAttributes|WS_EX_LAYERED" `
              -Quiet) {
            throw "仍然存在旧版分层窗口实现。"
          }

          if (Select-String `
              -Path AirPlayServer\CSDLPlayer.cpp `
              -SimpleMatch '"Region Capture"' `
              -Quiet) {
            throw "区域截图按钮仍有可见英文。"
          }

          $damagedIncludes = Select-String `
            -Path `
              AirPlayServer\AirPlayServer.cpp, `
              AirPlayServer\CAirServer.cpp, `
              AirPlayServer\CImGuiManager.cpp, `
              AirPlayServer\CSDLPlayer.cpp `
            -Pattern '#inc(?:l|1)8de'

          if ($null -ne $damagedIncludes) {
            throw "检测到 include 指令被破坏。"
          }

      - name: 编译 Release x64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          msbuild AirPlay.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /verbosity:minimal

      - name: 准备测试版
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = Get-ChildItem `
            -Path $env:GITHUB_WORKSPACE `
            -Recurse `
            -Filter AirPlayServer.exe |
            Where-Object {
              $_.FullName -match '[\\/]x64[\\/]Release[\\/]'
            } |
            Select-Object -First 1

          if ($null -eq $exe) {
            throw "没有找到 Release x64 的 AirPlayServer.exe。"
          }

          $package = Join-Path `
            $env:RUNNER_TEMP `
            "AirPlayServer-中文标注截图-v7"

          New-Item `
            -ItemType Directory `
            -Path $package `
            -Force |
            Out-Null

          Copy-Item `
            -Path (Join-Path $exe.Directory.FullName "*") `
            -Destination $package `
            -Recurse `
            -Force

          "ARTIFACT_PATH=$package" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: 上传编译后的测试版
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayServer-中文无闪烁标注截图-v7
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: 提交修改
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ((git status --porcelain).Length -eq 0) {
            Write-Host "没有需要提交的修改。"
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email `
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add `
            AirPlayServer/CSDLPlayer.cpp `
            AirPlayServer/CImGuiManager.cpp `
            AirPlayServer/AirPlayServer.cpp `
            AirPlayServer/CAirServer.cpp `
            AirPlayServer/CScreenSnipper.cpp `
            AirPlayServer/CScreenSnipper.h `
            AirPlayServer/AirPlayServer.vcxproj `
            README.md

          git commit -m `
            "Fix Chinese UI and annotated capture v7"
          git push
