name: Restore English and refine capture toolbar v10

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refine:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore English and refine toolbar
        shell: pwsh
        run: |
          $patchBase64 = @(
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
          ) -join ""

          $patchPath = Join-Path `
            $env:RUNNER_TEMP `
            "restore-english-toolbar-v10.ps1"

          [IO.File]::WriteAllBytes(
              $patchPath,
              [Convert]::FromBase64String($patchBase64))

          & $patchPath

      - name: Verify source changes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawToolbarBackground"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawSelectedToolBackground"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawPencilIcon"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawMosaicIcon"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern 'L"Region Capture"'

          $sourceFiles = @(
            "AirPlayServer\CSDLPlayer.cpp",
            "AirPlayServer\CImGuiManager.cpp",
            "AirPlayServer\AirPlayServer.cpp",
            "AirPlayServer\CAirServer.cpp",
            "AirPlayServer\CScreenSnipper.cpp"
          )

          $chinese = Select-String `
            -Path $sourceFiles `
            -Pattern '[一-龥]'

          if ($null -ne $chinese) {
            $chinese | ForEach-Object {
              Write-Host $_.Path $_.LineNumber $_.Line
            }
            throw "Chinese text remains in visible source files."
          }

          if (Select-String `
              -Path AirPlayServer\CImGuiManager.cpp `
              -Pattern "AIRPLAY_CHINESE_FONT_FIX_V8" `
              -Quiet) {
            throw "The Chinese font override was not removed."
          }

      - name: Build Release x64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          msbuild AirPlay.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /verbosity:minimal

      - name: Prepare test package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = Get-ChildItem `
            -Path $env:GITHUB_WORKSPACE `
            -Recurse `
            -Filter AirPlayServer.exe |
            Where-Object {
              $_.FullName -match '[\\/]x64[\\/]Release[\\/]'
            } |
            Select-Object -First 1

          if ($null -eq $exe) {
            throw "Release x64 AirPlayServer.exe was not found."
          }

          $package = Join-Path `
            $env:RUNNER_TEMP `
            "AirPlayServer-English-Refined-Toolbar-v10"

          New-Item `
            -ItemType Directory `
            -Path $package `
            -Force |
            Out-Null

          Copy-Item `
            -Path (Join-Path $exe.Directory.FullName "*") `
            -Destination $package `
            -Recurse `
            -Force

          "ARTIFACT_PATH=$package" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: Upload test package
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayServer-English-Refined-Toolbar-v10
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Commit changes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ((git status --porcelain).Length -eq 0) {
            Write-Host "No changes to commit."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email `
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add `
            AirPlayServer/CSDLPlayer.cpp `
            AirPlayServer/CImGuiManager.cpp `
            AirPlayServer/AirPlayServer.cpp `
            AirPlayServer/CAirServer.cpp `
            AirPlayServer/CScreenSnipper.cpp `
            AirPlayServer/CScreenSnipper.h

          git commit -m `
            "Restore English UI and refine capture toolbar"
          git push
