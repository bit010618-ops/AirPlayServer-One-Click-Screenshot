name: 区域截图图标工具条 v9

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  icon-toolbar:
    runs-on: windows-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 应用图标工具条
        shell: pwsh
        run: |
          $patchBase64 = @(
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
            ''
          ) -join ""

          $patchPath = Join-Path $env:RUNNER_TEMP "icon-toolbar-v9.ps1"
          [IO.File]::WriteAllBytes(
              $patchPath,
              [Convert]::FromBase64String($patchBase64))
          & $patchPath

      - name: 检查图标工具条源码
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawToolbarIcon"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawCheckIcon"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawCrossIcon"
          Select-String `
            -Path AirPlayServer\CScreenSnipper.cpp `
            -Pattern "DrawUndoIcon"

          if (Select-String `
              -Path AirPlayServer\CScreenSnipper.cpp `
              -Pattern 'L"矩形"|L"圆形"|L"三角"|L"箭头"|L"画笔"|L"马赛克"|L"撤销"|L"完成"|L"取消"' `
              -Quiet) {
            throw "工具条仍然包含文字按钮。"
          }

      - name: 编译 Release x64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          msbuild AirPlay.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /verbosity:minimal

      - name: 准备测试版
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = Get-ChildItem `
            -Path $env:GITHUB_WORKSPACE `
            -Recurse `
            -Filter AirPlayServer.exe |
            Where-Object {
              $_.FullName -match '[\\/]x64[\\/]Release[\\/]'
            } |
            Select-Object -First 1

          if ($null -eq $exe) {
            throw "没有找到 Release x64 的 AirPlayServer.exe。"
          }

          $package = Join-Path `
            $env:RUNNER_TEMP `
            "AirPlayServer-图标工具条-v9"

          New-Item `
            -ItemType Directory `
            -Path $package `
            -Force |
            Out-Null

          Copy-Item `
            -Path (Join-Path $exe.Directory.FullName "*") `
            -Destination $package `
            -Recurse `
            -Force

          "ARTIFACT_PATH=$package" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: 上传测试版
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayServer-图标工具条-v9
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: 提交修改
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ((git status --porcelain).Length -eq 0) {
            Write-Host "没有需要提交的修改。"
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email `
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add AirPlayServer/CScreenSnipper.cpp AirPlayServer/CScreenSnipper.h
          git commit -m "Use icon-only toolbar for region capture"
          git push
