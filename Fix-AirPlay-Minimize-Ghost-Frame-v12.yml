name: Fix minimize ghost frame v12

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-minimize-ghost:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply minimize ghost-frame fix
        shell: pwsh
        run: |
          $patchBase64 = @(
            ''
            ''
          ) -join ""

          $patchPath = Join-Path `
            $env:RUNNER_TEMP `
            "fix-minimize-ghost-v12.ps1"

          [IO.File]::WriteAllBytes(
              $patchPath,
              [Convert]::FromBase64String($patchBase64))

          & $patchPath

      - name: Verify source patch
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $sourcePath = "AirPlayServer\CSDLPlayer.cpp"

          Select-String `
            -Path $sourcePath `
            -Pattern "AIRPLAY_MINIMIZE_GHOST_FIX_V12"

          Select-String `
            -Path $sourcePath `
            -Pattern "airPlayMainWindowDrawable"

          Select-String `
            -Path $sourcePath `
            -Pattern "SDL_WINDOW_MINIMIZED"

          Select-String `
            -Path $sourcePath `
            -Pattern "SDL_WINDOW_HIDDEN"

          Select-String `
            -Path $sourcePath `
            -Pattern "if \(!airPlayMainWindowDrawable\)"

          $markerCount = (
            Select-String `
              -Path $sourcePath `
              -Pattern "AIRPLAY_MINIMIZE_GHOST_FIX_V12"
          ).Count

          if ($markerCount -ne 1) {
            throw "Expected exactly one minimize-fix marker; found $markerCount."
          }

          $changedFiles = @(
            git diff --name-only
          )

          $unexpected = @(
            $changedFiles |
              Where-Object {
                $_ -ne "AirPlayServer/CSDLPlayer.cpp"
              }
          )

          if ($unexpected.Count -gt 0) {
            throw (
              "Unexpected files changed: " +
              ($unexpected -join ", ")
            )
          }

          git diff --check

      - name: Build Release x64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          msbuild AirPlay.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /verbosity:minimal

      - name: Prepare test package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = Get-ChildItem `
            -Path $env:GITHUB_WORKSPACE `
            -Recurse `
            -Filter AirPlayServer.exe |
            Where-Object {
              $_.FullName -match '[\\/]x64[\\/]Release[\\/]'
            } |
            Select-Object -First 1

          if ($null -eq $exe) {
            throw "Release x64 AirPlayServer.exe was not found."
          }

          $package = Join-Path `
            $env:RUNNER_TEMP `
            "AirPlayServer-Minimize-Ghost-Fix-v12"

          New-Item `
            -ItemType Directory `
            -Path $package `
            -Force |
            Out-Null

          Copy-Item `
            -Path (Join-Path $exe.Directory.FullName "*") `
            -Destination $package `
            -Recurse `
            -Force

          "ARTIFACT_PATH=$package" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: Upload fixed test package
        uses: actions/upload-artifact@v4
        with:
          name: AirPlayServer-Minimize-Ghost-Fix-v12
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Commit fix
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ((git status --porcelain).Length -eq 0) {
            Write-Host "No source changes need to be committed."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email `
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- AirPlayServer/CSDLPlayer.cpp

          $stagedFiles = @(
            git diff --cached --name-only
          )

          if (
            $stagedFiles.Count -ne 1 -or
            $stagedFiles[0] -ne "AirPlayServer/CSDLPlayer.cpp"
          ) {
            throw (
              "Unexpected staged files: " +
              ($stagedFiles -join ", ")
            )
          }

          git commit -m `
            "Fix stale video frame after minimizing"

          git push
